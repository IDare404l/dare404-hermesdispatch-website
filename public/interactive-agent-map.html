<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission Freedom System — Solo Orchestrator + Modular Blocks</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid #0f3460;
        }
        
        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, #e94560, #7b68ee);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            color: #7a7a8a;
            margin-top: 8px;
        }
        
        .architecture-notice {
            background: #0f3460;
            border: 1px solid #e94560;
            border-radius: 8px;
            padding: 12px 20px;
            margin: 10px auto;
            max-width: 800px;
            text-align: center;
        }
        
        .architecture-notice strong {
            color: #e94560;
        }
        
        .architecture-notice small {
            color: #7a7a8a;
            display: block;
            margin-top: 2px;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: rgba(15, 52, 96, 0.3);
        }
        
        .filter-btn {
            padding: 8px 16px;
            border: 1px solid #0f3460;
            background: #16213e;
            color: #7a7a8a;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        
        .filter-btn:hover {
            border-color: #e94560;
            color: #e94560;
        }
        
        .filter-btn.active {
            background: #e94560;
            border-color: #e94560;
            color: #fff;
        }
        
        #viz-container {
            width: 100%;
            height: calc(100vh - 220px);
            position: relative;
        }
        
        svg {
            width: 100%;
            height: 100%;
        }
        
        .tooltip {
            position: absolute;
            background: rgba(22, 33, 62, 0.95);
            border: 1px solid #e94560;
            border-radius: 8px;
            padding: 12px;
            font-size: 0.9em;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            max-width: 280px;
            z-index: 1000;
        }
        
        .tooltip.show { opacity: 1; }
        .tooltip h4 {
            margin: 0 0 8px 0;
            color: #e94560;
            font-size: 1em;
        }
        .tooltip p {
            margin: 4px 0;
            color: #b0b0c0;
            font-size: 0.85em;
        }
        .tooltip .meta {
            color: #7a7a8a;
            font-size: 0.8em;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid #0f3460;
        }
        
        .legend {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(22, 33, 62, 0.95);
            border: 1px solid #0f3460;
            border-radius: 8px;
            padding: 15px;
            font-size: 0.85em;
        }
        
        .legend h4 {
            margin: 0 0 10px 0;
            color: #e94560;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
            color: #b0b0c0;
        }
        
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }
        
        .node { cursor: pointer; }
        .link { stroke-opacity: 0.4; }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.6em; }
            #viz-container { height: calc(100vh - 280px); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Mission Freedom System</h1>
        <p>Solo Orchestrator + Modular Block Architecture</p>
    </div>
    
    <div class="architecture-notice">
        <strong>Architecture Updated: May 19, 2026</strong>
        <small>1 Orchestrator (dare404) + 11 Blocks + 3 Background Learners + 3 Archived Agents</small>
    </div>

    <div class="controls">
        <button class="filter-btn active" data-filter="all">All Systems</button>
        <button class="filter-btn" data-filter="orchestrator">Orchestrator</button>
        <button class="filter-btn" data-filter="ecommerce">E-Commerce</button>
        <button class="filter-btn" data-filter="newsletter">Newsletter</button>
        <button class="filter-btn" data-filter="learner">Background Learners</button>
        <button class="filter-btn" data-filter="archived">Archived Agents</button>
    </div>

    <div id="viz-container"></div>
    
    <div class="tooltip" id="tooltip"></div>
    
    <div class="legend">
        <h4>System Status</h4>
        <div class="legend-item">
            <div class="legend-color" style="background: #7b68ee;"></div>
            <span>Orchestrator (dare404)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #e94560;"></div>
            <span>Functional Blocks (Active)</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #3dc1d3;"></div>
            <span>Background Learners</span>
        </div>
        <div class="legend-item">
            <div class="legend-color" style="background: #666;"></div>
            <span>Archived (Replaced)</span>
        </div>
    </div>

    <script>
// Data generated from block-registry.json
const nodes = [
    {"id":"dare404","name":"dare404","role":"Solo Orchestrator","category":"orchestrator","status":"active","type":"orchestrator","description":"Unified agent that loads and executes modular skill blocks","responsibilities":["Load skill blocks for task","Execute sequential workflows","Log to Obsidian","Coordinate background learners","Maintain unified context"]},
    {"id":"etsy-research","name":"Etsy Research Fetcher","role":"Ecommerce","category":"ecommerce","status":"active","type":"block","replaces":"tabby-01-research-fetcher","description":"Fetches competitor data from Etsy listings","skill_path":".hermes/skills/ecommerce/etsy-research"},
    {"id":"trend-analyzer","name":"Trend Analyzer","role":"Ecommerce","category":"ecommerce","status":"active","type":"block","replaces":"tabby-trend-analyzer","description":"Analyzes scraped data to identify design trends","skill_path":".hermes/skills/ecommerce/trend-analyzer"},
    {"id":"design-gen","name":"Design Generator","role":"Ecommerce","category":"ecommerce","status":"active","type":"block","replaces":"tabby-design-generator","description":"Creates design concepts from trend analysis","skill_path":".hermes/skills/ecommerce/design-generator"},
    {"id":"listing-optimizer","name":"Listing Optimizer","role":"Ecommerce","category":"ecommerce","status":"active","type":"block","replaces":"tabby-listing-optimizer","description":"Generates SEO packages for Etsy listings","skill_path":".hermes/skills/ecommerce/listing-optimizer"},
    {"id":"newsletter-gen","name":"Daily Newsletter Generator","role":"Newsletter","category":"newsletter","status":"active","type":"block","replaces":"newsletter-agent","description":"Auto-generates newsletter drafts from daily logs","skill_path":".hermes/skills/newsletter/daily-generator"},
    {"id":"approval-workflow","name":"Approval Workflow","role":"Newsletter","category":"newsletter","status":"active","type":"block","replaces":"newsletter-agent-approval","description":"Moves documents from Pending to Published","skill_path":".hermes/skills/newsletter/approval-workflow"},
    {"id":"timeline-sync","name":"Timeline Sync","role":"Newsletter","category":"newsletter","status":"active","type":"block","replaces":"newsletter-agent-sync","description":"Updates website timeline from published newsletters","skill_path":".hermes/skills/newsletter/timeline-sync"},
    {"id":"email-dispatcher","name":"Email Dispatcher","role":"Newsletter","category":"newsletter","status":"active","type":"block","replaces":"newsletter-agent-sender","description":"Sends newsletters via Himalaya CLI","skill_path":".hermes/skills/newsletter/email-dispatcher"},
    {"id":"self-diagnostic","name":"Self Diagnostic","role":"Orchestrator","category":"orchestrator","status":"active","type":"block","replaces":"igor-self-diagnostic","description":"Tracks performance metrics and error patterns","skill_path":".hermes/skills/orchestrator/self-diagnostic"},
    {"id":"pattern-recognizer","name":"Pattern Recognizer","role":"Orchestrator","category":"orchestrator","status":"active","type":"block","replaces":"igor-pattern-recognizer","description":"Catalogs error signatures and successful fixes","skill_path":".hermes/skills/orchestrator/pattern-recognizer"},
    {"id":"cron-manager","name":"Cron Manager","role":"Orchestrator","category":"orchestrator","status":"active","type":"block","replaces":"igor-cron-manager","description":"Validates and repairs cron jobs","skill_path":".hermes/skills/orchestrator/cron-manager"},
    {"id":"trend-hunter","name":"Trend Hunter Learner","role":"Background Learner","category":"learner","status":"active","type":"learner","frequency":"02:00 MST daily","description":"Research trending topics for agent skills"},
    {"id":"skill-trainer","name":"Skill Trainer","role":"Background Learner","category":"learner","status":"paused","type":"learner","frequency":"Token budget dependent","description":"Analyze skill effectiveness, suggest improvements"},
    {"id":"twatter-learner","name":"Twatter Learner","role":"Background Learner","category":"learner","status":"paused","type":"learner","frequency":"Paused - conservation mode","description":"Find Twitter engagement opportunities"},
    {"id":"librarian","name":"LIBRARIAN","role":"Migrated to blocks","category":"archived","status":"archived","type":"archived","description":"Absorbed into unified orchestrator on 2026-05-19"},
    {"id":"igor","name":"IGOR","role":"Migrated to blocks","category":"archived","status":"archived","type":"archived","description":"Converted to modular blocks on 2026-05-19"},
    {"id":"tabby","name":"TABBY","role":"Migrated to blocks","category":"archived","status":"archived","type":"archived","description":"Converted to modular blocks on 2026-05-19"}
];

const links = [
    {"source":"dare404","target":"etsy-research"},{"source":"dare404","target":"trend-analyzer"},{"source":"dare404","target":"design-gen"},{"source":"dare404","target":"listing-optimizer"},{"source":"dare404","target":"newsletter-gen"},{"source":"dare404","target":"approval-workflow"},{"source":"dare404","target":"timeline-sync"},{"source":"dare404","target":"email-dispatcher"},{"source":"dare404","target":"self-diagnostic"},{"source":"dare404","target":"pattern-recognizer"},{"source":"dare404","target":"cron-manager"},{"source":"dare404","target":"trend-hunter"},{"source":"dare404","target":"skill-trainer"},{"source":"dare404","target":"twatter-learner"}
];

const colorScale = {
    orchestrator: "#7b68ee",
    ecommerce: "#e94560",
    newsletter: "#ffa500",
    learner: "#3dc1d3",
    archived: "#666666"
};

const width = document.getElementById('viz-container').clientWidth;
const height = document.getElementById('viz-container').clientHeight;

const svg = d3.select("#viz-container").append("svg").attr("viewBox", [0, 0, width, height]);
const g = svg.append("g");

svg.call(d3.zoom().extent([[0, 0], [width, height]]).scaleExtent([0.3, 4]).on("zoom", (event) => g.attr("transform", event.transform)));

const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(120))
    .force("charge", d3.forceManyBody().strength(-600))
    .force("center", d3.forceCenter(width / 2, height / 2))
    .force("collision", d3.forceCollide().radius(d => d.type === "orchestrator" ? 70 : 45));

const link = g.append("g").selectAll("line").data(links).join("line").attr("class", "link").attr("stroke", "#0f3460").attr("stroke-width", d => d.source === "dare404" ? 3 : 1);

const node = g.append("g").selectAll("g").data(nodes).join("g").attr("class", "node")
    .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

node.append("circle").attr("r", d => d.type === "orchestrator" ? 50 : (d.type === "archived" ? 28 : 35))
    .attr("fill", d => {
        if (d.status === "paused") return "#2d4a5f";
        return colorScale[d.category] || "#888";
    })
    .attr("stroke", d => d.type === "archived" ? "#444" : (d.status === "paused" ? "#3dc1d3" : "#fff"))
    .attr("stroke-width", d => d.type === "orchestrator" ? 5 : 2)
    .attr("stroke-opacity", d => d.type === "archived" ? 0.3 : 1);

node.append("text").text(d => d.name.split(" ").slice(0, 2).join(" "))
    .attr("x", 0).attr("y", d => d.type === "orchestrator" ? 10 : (d.type === "archived" ? 40 : 48))
    .attr("text-anchor", "middle").attr("fill", d => d.type === "archived" ? "#666" : "#e0e0e0")
    .attr("font-size", d => d.type === "orchestrator" ? "14px" : "11px")
    .attr("font-weight", d => d.type === "orchestrator" ? "bold" : "normal");

node.append("text").text(d => d.status === "paused" ? "PAUSED" : "")
    .attr("x", 0).attr("y", 56).attr("text-anchor", "middle")
    .attr("fill", "#3dc1d3").attr("font-size", "9px").attr("letter-spacing", "1px");

const tooltip = d3.select("#tooltip");

node.on("click", (event, d) => {
    let content = `<h4>${d.name}</h4><p><strong>Type:</strong> ${d.type.toUpperCase()}</p><p><strong>Status:</strong> ${d.status}</p>`;
    if (d.description) content += `<p><strong>Description:</strong> ${d.description}</p>`;
    if (d.replaces) content += `<p><strong>Replaces:</strong> <span style="color: #666; text-decoration: line-through;">${d.replaces}</span></p>`;
    if (d.skill_path) content += `<p><strong>Skill:</strong> <code style="background: #0f3460; padding: 2px 6px; border-radius: 3px; font-size: 0.8em;">${d.skill_path}</code></p>`;
    if (d.frequency) content += `<p><strong>Frequency:</strong> ${d.frequency}</p>`;
    if (d.responsibilities) {
        content += `<div style="margin-top: 10px;"><strong>Responsibilities:</strong><ul style="margin: 5px 0; padding-left: 16px; color: #b0b0c0;">`;
        d.responsibilities.forEach(r => content += `<li>${r}</li>`);
        content += `</ul></div>`;
    }
    tooltip.html(content).style("left", (event.pageX + 15) + "px").style("top", (event.pageY - 15) + "px").classed("show", true);
    
    const connected = new Set([d.id, ...links.filter(l => l.source.id === d.id).map(l => l.target.id), ...links.filter(l => l.target.id === d.id).map(l => l.source.id)]);
    node.style("opacity", n => connected.has(n.id) ? 1 : 0.2);
    link.style("opacity", l => (l.source.id === d.id || l.target.id === d.id) ? 1 : 0.1);
});

d3.select("body").on("click", (event) => {
    if (!event.target.closest(".node")) {
        tooltip.classed("show", false);
        node.style("opacity", 1);
        link.style("opacity", 0.4);
    }
});

simulation.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
});

function dragstarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
function dragended(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }

document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const filterValue = btn.dataset.filter;
        if (filterValue === 'all') {
            node.style('opacity', 1).style('display', 'block');
            link.style('opacity', 0.4).style('display', 'block');
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        } else {
            node.style('opacity', d => (d.category === filterValue || d.type === filterValue) ? 1 : 0.1);
            link.style('opacity', 0.1);
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    });
});
    </script>
</body>
</html>
