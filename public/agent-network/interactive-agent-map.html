        let selectedAgent = null;
        
        const width = window.innerWidth;
        const height = window.innerHeight - 60;
        const container = d3.select("#viz-container");
        
        let currentFilter = 'all';
        let transform = d3.zoomIdentity;
        
        const svg = container.append("svg").attr("width", width).attr("height", height);
        const g = svg.append("g");
        
        const zoom = d3.zoom()
            .scaleExtent([0.3, 3])
            .on("zoom", (event) => { transform = event.transform; g.attr("transform", event.transform); });
        
        svg.call(zoom);
        
        const defs = svg.append("defs");
        defs.append("marker")
            .attr("id", "arrowhead")
            .attr("viewBox", "0 -5 10 10")
            .attr("refX", 25).attr("refY", 0)
            .attr("markerWidth", 6).attr("markerHeight", 6)
            .attr("orient", "auto")
            .append("path")
            .attr("d", "M0,-5L10,0L0,5")
            .attr("fill", "#334155");
        
        function prepareData(filter = 'all') {
            const filtered = filter === 'all' 
                ? AGENTS_DATA 
                : AGENTS_DATA.filter(a => a.category === filter || (filter === 'archived' && a.status === 'archived'));
            
            const nodes = filtered.map(a => ({...a, radius: a.status === 'archived' ? 25 : 35}));
            const links = [];
            const nodeIds = new Set(nodes.map(n => n.id));
            
            nodes.forEach(source => {
                if (source.related_agents) {
                    source.related_agents.forEach(targetId => {
                        if (nodeIds.has(targetId)) {
                            links.push({source: source.id, target: targetId});
                        }
                    });
                }
            });
            
            return {nodes, links};
        }
        
        let simulation, linkElements, nodeElements;
        
        function initVisualization() {
            const data = prepareData(currentFilter);
            
            const activeCount = AGENTS_DATA.filter(a => a.status === 'active').length;
            document.getElementById('active-count').textContent = activeCount;
            document.getElementById('update-time').textContent = new Date().toLocaleDateString();
            
            g.selectAll("*").remove();
            
            linkElements = g.append("g").selectAll("line")
                .data(data.links).enter().append("line")
                .attr("class", "link").attr("marker-end", "url(#arrowhead)");
            
            const nodeGroup = g.append("g").selectAll("g")
                .data(data.nodes).enter().append("g")
                .attr("class", d => `node ${d.status}`)
                .call(d3.drag()
                    .on("start", dragstarted)
                    .on("drag", dragged)
                    .on("end", dragended));
            
            nodeGroup.append("circle")
                .attr("r", d => d.radius)
                .attr("fill", d => d.color + '40')
                .attr("stroke", d => d.color)
                .attr("stroke-width", 2)
                .style("filter", d => d.status === 'archived' ? 'none' : `drop-shadow(0 0 10px ${d.color}80)`);
            
            nodeGroup.append("text").attr("class", "node-icon").attr("dy", -5).text(d => d.icon);
            nodeGroup.append("text").attr("class", "node-label").attr("dy", d => d.radius + 15).text(d => d.name.split(' ')[0]);
            nodeGroup.append("text").attr("class", "node-version").attr("dy", d => d.radius + 28).text(d => d.version);
            
            nodeGroup.on("click", (event, d) => { showModal(d); highlightConnections(d); })
                .on("mouseover", (event, d) => showTooltip(event, d))
                .on("mouseout", hideTooltip);
            
            nodeElements = nodeGroup;
            
            simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))
                .force("charge", d3.forceManyBody().strength(-800))
                .force("center", d3.forceCenter(width / 2, height / 2))
                .force("collision", d3.forceCollide().radius(d => d.radius + 20))
                .on("tick", ticked);
        }
        
        function highlightConnections(agent) {
            // Reset all links
            linkElements.classed("highlight", false);
            
            // Highlight connections to/from selected agent
            linkElements.classed("highlight", d => d.source.id === agent.id || d.target.id === agent.id);
        }
        
        function ticked() {
            linkElements
                .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
                .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
            nodeElements.attr("transform", d => `translate(${d.x},${d.y})`);
        }
        
        function dragstarted(event, d) {
            if (!event.active) simulation.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
        }
        
        function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
        
        function dragended(event, d) {
            if (!event.active) simulation.alphaTarget(0);
            d.fx = null; d.fy = null;
        }
        
        function showTooltip(event, d) {
            const tooltip = document.getElementById('tooltip');
            tooltip.innerHTML = `<strong>${d.name}</strong><br>${d.description.substring(0, 60)}...`;
            tooltip.style.left = (event.pageX + 10) + 'px';
            tooltip.style.top = (event.pageY - 10) + 'px';
            tooltip.classList.add('show');
        }
        
        function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }
        
        function showModal(agent) {
            selectedAgent = agent;
            const modal = document.getElementById('modal');
            document.getElementById('modal-icon').textContent = agent.icon;
            document.getElementById('modal-icon').style.background = agent.color + '20';
            document.getElementById('modal-icon').style.border = `2px solid ${agent.color}`;
            document.getElementById('modal-title').textContent = agent.name;
            document.getElementById('modal-category').textContent = agent.category;
            document.getElementById('modal-status').innerHTML = `<span style="color: ${agent.status === 'active' ? '#34d399' : '#94a3b8'}">● ${agent.status}</span>`;
            document.getElementById('modal-version').textContent = 'v' + agent.version;
            
            let body = '';
            body += '<div class="modal-section"><div class="section-title">Description</div><div class="section-body">' + agent.description + '</div></div>';
            body += '<div class="modal-section"><div class="section-title">Schedule</div><div class="schedule-info"><span>🕐</span><span>' + agent.schedule + '</span></div></div>';
            
            if (agent.skills && agent.skills.length > 0) {
                body += '<div class="modal-section"><div class="section-title">Skills (' + agent.skills.length + ')</div><div class="skills-list">' + 
                    agent.skills.map(s => '<span class="skill-tag">' + s + '</span>').join('') + '</div></div>';
            }
            
            if (agent.metrics) {
                body += '<div class="modal-section"><div class="section-title">Metrics</div><div class="metrics-grid">' + 
                    Object.entries(agent.metrics).map(([k,v]) => '<div class="metric-card"><div class="metric-value">' + v + '</div><div class="metric-label">' + k.replace(/_/g, ' ') + '</div></div>').join('') + '</div></div>';
            }
            
            if (agent.related_agents && agent.related_agents.length > 0) {
                body += '<div class="modal-section"><div class="section-title">Related Agents</div><div class="related-list">' + 
                    agent.related_agents.map(rid => {
                        const related = AGENTS_DATA.find(a => a.id === rid);
                        return related ? '<span class="related-tag" onclick="showRelated(&quot;' + rid + '&quot;)">' + related.icon + ' ' + related.name.split(' ')[0] + '</span>' : '';
                    }).join('') + '</div></div>';
            }
            
            document.getElementById('modal-body').innerHTML = body;
            modal.classList.add('show');
        }
        
        function showRelated(agentId) {
            const agent = AGENTS_DATA.find(a => a.id === agentId);
            if (agent) showModal(agent);
        }
        
        function closeModal() { 
            document.getElementById('modal').classList.remove('show');
            linkElements.classed("highlight", false);
        }
        
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.dataset.filter;
                initVisualization();
            });
        });
        
        function zoomIn() { svg.transition().duration(300).call(zoom.scaleBy, 1.3); }
        function zoomOut() { svg.transition().duration(300).call(zoom.scaleBy, 0.7); }
        function resetZoom() { svg.transition().duration(500).call(zoom.transform, d3.zoomIdentity); }
        
        document.getElementById('modal').addEventListener('click', (e) => { if(e.target === document.getElementById('modal')) closeModal(); });
        document.addEventListener('keydown', (e) => { if(e.key === 'Escape') closeModal(); });
        
        initVisualization();
        
        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight - 60;
            svg.attr("width", newWidth).attr("height", newHeight);
            simulation.force("center", d3.forceCenter(newWidth / 2, newHeight / 2));
            simulation.alpha(0.3).restart();
        });
    </script>
</body>
</html>
