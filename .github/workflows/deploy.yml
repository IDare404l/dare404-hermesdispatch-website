name: Build and Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Update version.json
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          RUN_NUM="${GITHUB_RUN_NUMBER}"
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo '{"build": "'"${RUN_NUM}"'", "commit": "'"${SHORT_SHA}"'", "timestamp": "'"${TIMESTAMP}"'"}' > src/config/version.json
          echo "Version: Build #${RUN_NUM} | ${SHORT_SHA} | ${TIMESTAMP}"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

      - name: Copy public assets
        run: |
          mkdir -p dist/agent-network
          cp -r public/agent-network/* dist/agent-network/ 2>/dev/null || true
          echo "Contents of dist:"
          ls -la dist/

      - name: Build Complete
        run: echo "✅ Build complete - Cloudflare Pages auto-deploys via Git integration"