name: Deploy to Cloudflare Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Update version.json
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          RUN_NUM="${GITHUB_RUN_NUMBER}"
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          echo '{"build": "'"${RUN_NUM}"'", "commit": "'"${GITHUB_SHA}"'", "timestamp": "'"${TIMESTAMP}"'"}' > src/config/version.json
          echo "Version: Build #${RUN_NUM} | ${SHORT_SHA} | ${TIMESTAMP}"
          cat src/config/version.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Copy public assets
        run: |
          mkdir -p dist/agent-network
          cp -r public/agent-network/* dist/agent-network/ 2>/dev/null || true
          cp public/interactive-agent-map.html dist/ 2>/dev/null || true
          ls -la dist/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name hermesdispatch --branch production
